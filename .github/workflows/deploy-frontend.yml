name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "retention-ui/**"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: retention-ui/package-lock.json

      - name: Install dependencies
        working-directory: retention-ui
        run: npm ci

      - name: Build
        working-directory: retention-ui
        env:
          NODE_ENV: production
          VITE_API_BASE: https://retentionagent.onrender.com
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: retention-ui/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4